name: Notificação diária de ganho líquido

on:
  schedule:
    # 11h,14h,17h,20h,23h UTC = 8h,11h,14h,17h,20h horário de Brasília (5x/dia)
    - cron: '0 11,14,17,20,23 * * *'
  workflow_dispatch: {}    # permite disparar manualmente pra testar

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependências
        run: npm install web-push --no-save
      - name: Verificar e notificar
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node scripts/notif-diaria.js
