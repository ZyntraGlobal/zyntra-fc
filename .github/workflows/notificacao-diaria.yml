name: Notificação diária de ganho líquido

on:
  schedule:
    # Roda a cada 15 min o dia inteiro — o próprio script decide se é hora de
    # notificar (8h,11h,14h,17h,20h BRT) e evita duplicar. Isso protege contra
    # o GitHub Actions atrasar/pular um horário de cron exato ocasionalmente.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}    # permite disparar manualmente pra testar

permissions:
  contents: write

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependências
        run: npm install web-push --no-save
      - name: Verificar e notificar
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node scripts/notif-diaria.js
      - name: Salvar estado (se mudou)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f notif-state.json ] && git add notif-state.json || true
          if git diff --staged --quiet; then
            echo "Nada novo pra salvar."
          else
            git commit -m "Atualiza estado da notificacao diaria"
            git pull --rebase origin main
            git push
          fi
